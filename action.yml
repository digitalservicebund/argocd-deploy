name: Deploy
description: "ArgoCD based deploy action. Requires kustomize to run."

inputs:
  environment:
    required: true
    description: "Environment to deploy to, e.g. staging, production."
  version:
    required: true
    description: "Container image tag being deployed, e.g. a commit SHA."
  deploying_repo:
    required: true
    description: "List of image repositories (image names) being deployed."
  infra_repo:
    required: true
    description: "Repository for ArgoCD to pick up changes from."
  infra_branch:
    required: true
    description: "Branch in infra_repo for ArgoCD to pick up changes from."
    default: "main"
  github_app_private_key:
    required: true
    description: "Private key of a Github App that has Repository Content Read & Write access to the infra repo."
  github_app_id:
    required: true
    description: "App ID of a Github App that has Repository Content Read & Write access to the infra repo."
  app:
    required: true
    description: "ArgoCD application to be deployed."
  argocd_auth_token:
    required: true
    description: "Auth token of the `pipeline` user in ArgoCD (read-only permissions for such user are sufficient)."
  argocd_server:
    required: true
    description: "Host name of the server where ArgoCD runs, e.g. argocd.example.com"
  argocd_sync_timeout:
    required: false
    default: "120"
    description: "Timeout applied to the argocd sync trigger"
  wait_for_healthy_app:
    required: false
    default: "true"
    description: "Whether to wait for the ArgoCD app to become healthy after syncing. If false, the last health check step is skipped."

runs:
  using: "composite"
  steps:
    - name: "Create GitHub App token"
      uses: actions/create-github-app-token@v2
      id: app-token
      with:
        app-id: ${{ inputs.github_app_id }}
        private-key: ${{ inputs.github_app_private_key }}
        owner: digitalservicebund
        repositories: ${{ inputs.infra_repo }}
    - name: "Checkout infra repository"
      uses: actions/checkout@v6
      with:
        repository: digitalservicebund/${{ inputs.infra_repo }}
        ref: ${{ inputs.infra_branch }}
        token: ${{ steps.app-token.outputs.token }}
    - name: "Update image tag for ${{ inputs.environment }}"
      env:
        DEPLOYING_REPOS: ${{ inputs.deploying_repo }}
      shell: bash
      run: |
        set -ex
        cd manifests/overlays/${{ inputs.environment }}
        IFS=,
        for repo in $DEPLOYING_REPOS
        do
          kustomize edit set image ghcr.io/digitalservicebund/${repo}:${{ inputs.version }}
        done
    - name: "Commit and push changes to infra repo"
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        INFRA_REPO: ${{ inputs.infra_repo }}
        INFRA_BRANCH: ${{ inputs.infra_branch }}
        ENVIRONMENT: ${{ inputs.environment }}
        VERSION: ${{ inputs.version }}
        DEPLOYING_REPO: ${{ inputs.deploying_repo }}
      run: |
        set -ex

        # Check if there are any changes to commit
        git add manifests/overlays/${ENVIRONMENT}/kustomization.yaml
        if git diff-index --cached --quiet HEAD; then
          echo "No changes to commit."
          exit 0
        fi

        # Use the GitHub API to create a verified commit
        REPO="digitalservicebund/${INFRA_REPO}"
        FILE_PATH="manifests/overlays/${ENVIRONMENT}/kustomization.yaml"
        FILE_CONTENT=$(base64 -i "${FILE_PATH}")
        HEAD_SHA=$(git rev-parse HEAD)
        TREE_SHA=$(git rev-parse HEAD^{tree})

        # Create a new blob with the updated file content
        BLOB_SHA=$(gh api "repos/${REPO}/git/blobs" \
          -f content="${FILE_CONTENT}" \
          -f encoding="base64" \
          --jq '.sha')

        # Create a new tree with the updated file
        NEW_TREE_SHA=$(gh api "repos/${REPO}/git/trees" \
          -f base_tree="${TREE_SHA}" \
          -f tree[][path]="${FILE_PATH}" \
          -f tree[][mode]="100644" \
          -f tree[][type]="blob" \
          -f tree[][sha]="${BLOB_SHA}" \
          --jq '.sha')

        # Create a verified commit via the API
        # Omit author/committer so GitHub auto-signs the commit as the App
        COMMIT_MESSAGE="Bump ${ENVIRONMENT} image to ${VERSION}

        Repository: ${DEPLOYING_REPO}

        [skip ci]"
        NEW_COMMIT_SHA=$(gh api "repos/${REPO}/git/commits" \
          -f message="${COMMIT_MESSAGE}" \
          -f tree="${NEW_TREE_SHA}" \
          -f parents[]="${HEAD_SHA}" \
          --jq '.sha')

        # Update the branch ref to point to the new commit
        gh api "repos/${REPO}/git/refs/heads/${INFRA_BRANCH}" \
          -X PATCH \
          -f sha="${NEW_COMMIT_SHA}"
    - name: "Determine ArgoCD version"
      id: argocd-version
      shell: bash
      run: |
        set -ex
        argocd_version=$(curl -s https://${ARGOCD_SERVER}/api/version | jq -r '.Version | split("+")[0]')
        echo "version=$argocd_version" >> $GITHUB_OUTPUT
      env:
        ARGOCD_SERVER: ${{ inputs.argocd_server }}
    - name: "Cache argocd executable"
      id: cache-argocd
      uses: actions/cache@v5
      with:
        path: argocd
        key: ${{ steps.argocd-version.outputs.version }}-argocd
    - name: "Download argocd executable"
      if: steps.cache-argocd.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -ex
        curl -sSL -o argocd "https://github.com/argoproj/argo-cd/releases/download/${{ steps.argocd-version.outputs.version }}/argocd-linux-amd64"
    - name: "Trigger Argo CD sync"
      shell: bash
      run: |
        set -ex
        chmod +x argocd
        ./argocd app wait ${{ inputs.app }} --sync --timeout ${{ inputs.argocd_sync_timeout }} --grpc-web
        ./argocd app get --refresh ${{ inputs.app }} --grpc-web > /dev/null
        if [ "${{ inputs.wait_for_healthy_app }}" = "true" ]; then
          ./argocd app wait ${{ inputs.app }} --sync --health --timeout ${{ inputs.argocd_sync_timeout }} --grpc-web
        fi
      env:
        ARGOCD_SERVER: ${{ inputs.argocd_server }}
        ARGOCD_AUTH_TOKEN: ${{ inputs.argocd_auth_token }}
